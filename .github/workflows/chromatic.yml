name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Skip when Chromatic token is missing
        if: ${{ env.CHROMATIC_PROJECT_TOKEN == '' }}
        run: echo "CHROMATIC_PROJECT_TOKEN is not configured; skipping Chromatic."

      - name: Install frontend-v3 dependencies
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        run: npm --prefix frontend-v3 ci

      - name: Publish dashboard-v3 to Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: frontend-v3
