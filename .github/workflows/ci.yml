name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright browser for Storybook tests
        run: npx --prefix frontend-v3 playwright install --with-deps chromium

      - name: Storybook component and accessibility tests
        run: npm run test:storybook:dashboard-v3

      - name: Test
        run: npm test -- --run
